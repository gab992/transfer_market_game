services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: transfer_market_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Named volume — data persists across container restarts and removals
      - postgres_data:/var/lib/postgresql/data
      # The postgres image automatically runs any .sql files in this directory
      # on first startup (when the data volume is empty), so the schema is
      # created for you without a manual psql command.
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
